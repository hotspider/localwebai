services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: family_ai
      POSTGRES_USER: family_ai
      POSTGRES_PASSWORD: family_ai_password
    ports:
      - "5432:5432"
    volumes:
      - family_ai_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U family_ai -d family_ai"]
      interval: 2s
      timeout: 5s
      retries: 20
      start_period: 10s

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - family_ai_uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  family_ai_db:
  family_ai_uploads:

